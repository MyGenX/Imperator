name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: pip install -e cli pytest

      - name: Run tests
        run: pytest cli/tests -q

      - name: Validate rule sources and ID registry
        run: imperator validate

      - name: Verify agents build and plugin/marketplace are in sync
        run: python compiler/compile.py --check

      - name: Shell syntax check
        run: bash -n install.sh
